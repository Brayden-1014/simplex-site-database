<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simplex Site Database</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e8eaf0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
  .topbar { background: #161922; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-size: 18px; font-weight: 700; color: #e8eaf0; }
  .topbar-sub { font-size: 12px; color: #8b90a0; margin-top: 2px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; padding: 16px 24px; background: #13161e; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 16px; min-width: 110px; }
  .stat-val { font-size: 22px; font-weight: 700; color: #3d8ef8; }
  .stat-label { font-size: 11px; color: #8b90a0; margin-top: 2px; }
  .stat.green .stat-val { color: #2ecc8a; }
  .stat.amber .stat-val { color: #f5a623; }
  .stat.purple .stat-val { color: #9b6dff; }
  .stat.teal .stat-val { color: #1ecbc8; }
  .filters { padding: 14px 24px; background: #13161e; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filters input, .filters select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #e8eaf0; padding: 7px 11px; font-size: 12px; outline: none; }
  .filters input { width: 200px; }
  .filters input::placeholder { color: #8b90a0; }
  .filters select option { background: #1e2130; }
  .filters label { font-size: 11px; color: #8b90a0; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .btn { background: rgba(61,142,248,0.15); border: 1px solid rgba(61,142,248,0.3); color: #3d8ef8; border-radius: 6px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-weight: 500; }
  .btn:hover { background: rgba(61,142,248,0.25); }
  .btn-green { background: rgba(46,204,138,0.12); border-color: rgba(46,204,138,0.3); color: #2ecc8a; }
  .btn-green:hover { background: rgba(46,204,138,0.22); }
  .table-wrap { overflow-x: auto; padding: 0 24px 24px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th { background: #161922; color: #8b90a0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: #e8eaf0; }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; color: #3d8ef8; }
  td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: top; line-height: 1.4; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .b-active { background: rgba(46,204,138,0.15); color: #2ecc8a; }
  .b-cm { background: rgba(245,166,35,0.15); color: #f5a623; }
  .b-dev { background: rgba(61,142,248,0.15); color: #3d8ef8; }
  .b-rehab { background: rgba(139,144,160,0.15); color: #8b90a0; }
  .b-proposed { background: rgba(155,109,255,0.15); color: #9b6dff; }
  .b-brown { background: rgba(245,166,35,0.12); color: #f5a623; }
  .b-green2 { background: rgba(46,204,138,0.12); color: #2ecc8a; }
  .b-both { background: rgba(30,203,200,0.12); color: #1ecbc8; }
  .b-rehab2 { background: rgba(139,144,160,0.12); color: #8b90a0; }
  .telco-notes { font-size: 11px; color: #8b90a0; max-width: 200px; }
  .telco-notes.highlight { color: #f5a623; }
  .no-results { padding: 40px; text-align: center; color: #8b90a0; }
  .result-count { font-size: 12px; color: #8b90a0; padding: 8px 24px 0; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Simplex Intelligence — Site Database</div>
    <div class="topbar-sub">WA mine sites with accommodation villages — brownfields &amp; greenfields opportunities</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-green" onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="search" placeholder="Mine, operator, village…" oninput="applyFilters()">
  </div>
  <div class="filter-group">
    <label>Region</label>
    <select id="f-region" onchange="applyFilters()">
      <option value="">All regions</option>
      <option>Pilbara</option>
      <option>Goldfields-Esperance</option>
      <option>Mid West</option>
      <option>Kimberley</option>
      <option>Wheatbelt / Peel</option>
      <option>Other</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Status</label>
    <select id="f-status" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option>Active</option>
      <option>Care &amp; Maintenance</option>
      <option>Development</option>
      <option>Proposed</option>
      <option>Closed / Rehab</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Opportunity</label>
    <select id="f-opp" onchange="applyFilters()">
      <option value="">All types</option>
      <option>Brownfields</option>
      <option>Greenfields</option>
      <option>Both</option>
      <option>Rehab / Closure</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Village Type</label>
    <select id="f-vtype" onchange="applyFilters()">
      <option value="">All village types</option>
      <option>On-site</option>
      <option>Indirect (town-based)</option>
      <option>Unknown</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Commodity</label>
    <select id="f-commodity" onchange="applyFilters()">
      <option value="">All commodities</option>
    </select>
  </div>
  <button class="btn" onclick="resetFilters()" style="align-self:flex-end;">Reset</button>
</div>

<div class="result-count" id="result-count"></div>

<div class="table-wrap">
  <table id="db-table">
    <thead>
      <tr>
        <th onclick="sortBy('name')" data-col="name"># Mine / Project <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('operator')" data-col="operator">Operator <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('commodity')" data-col="commodity">Commodity <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('region')" data-col="region">Region <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('status')" data-col="status">Status <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('village')" data-col="village">Village / Camp <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('villageOperator')" data-col="villageOperator">Village Operator <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('villageType')" data-col="villageType">Type <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('capacity')" data-col="capacity">Capacity <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('opportunityType')" data-col="opportunityType">Opportunity <span class="sort-arrow">↕</span></th>
        <th>Telco Notes</th>
      </tr>
    </thead>
    <tbody id="db-body"></tbody>
  </table>
  <div class="no-results" id="no-results" style="display:none;">No matching sites found.</div>
</div>

let sortCol = 'region', sortDir = 1;
let filtered = [...data];

function statusBadge(s) {
  if (s === 'Active') return `<span class="badge b-active">Active</span>`;
  if (s === 'Care & Maintenance') return `<span class="badge b-cm">C&amp;M</span>`;
  if (s === 'Development') return `<span class="badge b-dev">Development</span>`;
  if (s === 'Closed / Rehab') return `<span class="badge b-rehab">Rehab</span>`;
  if (s === 'Proposed') return `<span class="badge b-proposed">Proposed</span>`;
  return `<span class="badge b-rehab">${s}</span>`;
}
function oppBadge(o) {
  if (o === 'Brownfields') return `<span class="badge b-brown">Brownfields</span>`;
  if (o === 'Greenfields') return `<span class="badge b-green2">Greenfields</span>`;
  if (o === 'Both') return `<span class="badge b-both">Both</span>`;
  if (o === 'Rehab / Closure') return `<span class="badge b-rehab2">Rehab</span>`;
  return `<span class="badge b-rehab2">${o}</span>`;
}

function renderStats() {
  const total = data.length;
  const active = data.filter(d => d.status === 'Active').length;
  const cm = data.filter(d => d.status === 'Care & Maintenance').length;
  const dev = data.filter(d => d.status === 'Development').length;
  const brown = data.filter(d => d.opportunityType === 'Brownfields' || d.opportunityType === 'Both').length;
  const green = data.filter(d => d.opportunityType === 'Greenfields' || d.opportunityType === 'Both').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat green"><div class="stat-val">${active}</div><div class="stat-label">Active</div></div>
    <div class="stat amber"><div class="stat-val">${cm}</div><div class="stat-label">Care &amp; Maintenance</div></div>
    <div class="stat purple"><div class="stat-val">${dev}</div><div class="stat-label">Development</div></div>
    <div class="stat amber"><div class="stat-val">${brown}</div><div class="stat-label">Brownfields Opp</div></div>
    <div class="stat teal"><div class="stat-val">${green}</div><div class="stat-label">Greenfields Opp</div></div>
  `;
}

function populateCommodityFilter() {
  const commodities = [...new Set(data.map(d => d.commodity))].sort();
  const sel = document.getElementById('f-commodity');
  commodities.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const region = document.getElementById('f-region').value;
  const status = document.getElementById('f-status').value;
  const opp = document.getElementById('f-opp').value;
  const vtype = document.getElementById('f-vtype').value;
  const commodity = document.getElementById('f-commodity').value;
  filtered = data.filter(d => {
    if (region && d.region !== region) return false;
    if (status && d.status !== status) return false;
    if (opp && d.opportunityType !== opp) return false;
    if (vtype && d.villageType !== vtype) return false;
    if (commodity && d.commodity !== commodity) return false;
    if (q) {
      const hay = [d.name, d.operator, d.village, d.villageOperator, d.telcoNotes, d.commodity].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  document.querySelector(`th[data-col="${col}"]`)?.classList.add('sorted');
  renderTable();
}

function renderTable() {
  const sorted = [...filtered].sort((a, b) => {
    const av = (a[sortCol] || '').toString().toLowerCase();
    const bv = (b[sortCol] || '').toString().toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  const tbody = document.getElementById('db-body');
  document.getElementById('result-count').textContent = `Showing ${sorted.length} of ${data.length} sites`;
  if (sorted.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('no-results').style.display = 'block';
    return;
  }
  document.getElementById('no-results').style.display = 'none';
  tbody.innerHTML = sorted.map(d => `
    <tr>
      <td><strong>${d.name}</strong></td>
      <td style="color:#c8cad4">${d.operator}</td>
      <td style="color:#c8cad4">${d.commodity}</td>
      <td style="color:#c8cad4">${d.region}</td>
      <td>${statusBadge(d.status)}</td>
      <td style="color:#c8cad4">${d.village}</td>
      <td style="color:#c8cad4">${d.villageOperator}</td>
      <td style="color:#8b90a0;font-size:11px">${d.villageType}</td>
      <td style="color:#8b90a0;font-size:11px">${d.capacity}</td>
      <td>${oppBadge(d.opportunityType)}</td>
      <td><div class="telco-notes${d.telcoNotes && (d.telcoNotes.includes('opportunity') || d.telcoNotes.includes('upgrade') || d.telcoNotes.includes('Direct')) ? ' highlight' : ''}">${d.telcoNotes || '—'}</div></td>
    </tr>
  `).join('');
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-region').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-opp').value = '';
  document.getElementById('f-vtype').value = '';
  document.getElementById('f-commodity').value = '';
  filtered = [...data];
  renderTable();
}

function exportCSV() {
  const cols = ['id','name','operator','commodity','region','status','village','villageOperator','villageType','capacity','opportunityType','telcoNotes','source','dateAdded','lastUpdated'];
  const rows = [cols.join(','), ...filtered.map(d => cols.map(c => `"${(d[c]||'').toString().replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Simplex Site Database.csv';
  a.click();
}

renderStats();
populateCommodityFilter();
renderTable();
</script>
